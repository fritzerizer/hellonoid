<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">

<title>Hellonoid Logo Concepts — 50 förslag</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Poppins', sans-serif; background: #0a0a0f; color: #e4e4ed; }
  .header { text-align: center; padding: 48px 24px 32px; }
  .header h1 { font-size: 32px; font-weight: 700; background: linear-gradient(135deg, #239eab, #74deee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header p { color: #888; margin-top: 8px; font-size: 14px; max-width: 600px; margin-inline: auto; }
  .controls { text-align: center; margin-bottom: 32px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; padding: 0 24px; }
  .controls button { background: #1a1a26; border: 1px solid #2a2a3a; color: #a0a0b0; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 13px; transition: all 0.2s; }
  .controls button:hover, .controls button.active { border-color: #239eab; color: #239eab; background: rgba(35,158,171,0.1); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 0 24px 48px; max-width: 1400px; margin: 0 auto; }
  .card { background: #12121a; border: 1px solid #2a2a3a; border-radius: 16px; padding: 24px; text-align: center; transition: all 0.3s; cursor: pointer; position: relative; }
  .card:hover { border-color: #239eab; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(35,158,171,0.15); }
  .card .num { position: absolute; top: 10px; left: 14px; font-size: 11px; color: #444; font-weight: 600; }
  .card svg { width: 120px; height: 120px; margin: 8px auto 16px; display: block; }
  .card .label { font-size: 12px; color: #666; font-weight: 500; }
  .card .style { font-size: 10px; color: #444; margin-top: 4px; }
  .card.light { background: #f5f5f5; border-color: #ddd; }
  .card.light .num, .card.light .style { color: #999; }
  .card.light .label { color: #666; }
  .card.light:hover { border-color: #239eab; }
  .toggle-bg { text-align: center; margin-bottom: 24px; }
  .toggle-bg button { background: #1a1a26; border: 1px solid #2a2a3a; color: #888; padding: 6px 14px; font-size: 12px; border-radius: 6px; cursor: pointer; font-family: inherit; }
  .toggle-bg button:hover { border-color: #239eab; color: #239eab; }
  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #12121a; border: 1px solid #2a2a3a; border-radius: 20px; padding: 48px; text-align: center; max-width: 500px; }
  .modal svg { width: 240px; height: 240px; }
  .modal .label { font-size: 18px; margin-top: 16px; font-weight: 600; }
  .modal .style { font-size: 13px; color: #666; margin-top: 6px; }
  .modal-close { margin-top: 20px; background: #239eab; border: none; color: #fff; padding: 8px 24px; border-radius: 8px; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>

<div class="header">
  <h1>Hellonoid — Logotypidéer</h1>
  <p>50 förslag på logotyp. H + humanoid robotsiluett. Klicka på ett förslag för att se det större. Alla är SVG och kan skalas fritt.</p>
</div>

<div class="controls">
  <button class="active" onclick="filter('all')">Alla (50)</button>
  <button onclick="filter('shield')">Sköld</button>
  <button onclick="filter('minimal')">Minimal</button>
  <button onclick="filter('geometric')">Geometrisk</button>
  <button onclick="filter('rounded')">Rundad</button>
  <button onclick="filter('outline')">Outline</button>
  <button onclick="filter('bold')">Bold</button>
</div>

<div class="toggle-bg">
  <button onclick="toggleBg()">Växla ljus/mörk bakgrund</button>
</div>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modal" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div id="modalSvg"></div>
    <div class="label" id="modalLabel"></div>
    <div class="style" id="modalStyle"></div>

// ═══════════════════════════════════════════════════════════
// Render grid
// ═══════════════════════════════════════════════════════════

const grid = document.getElementById('grid');

function render(items) {
  grid.innerHTML = '';
  items.forEach((logo, i) => {
    const globalIdx = logos.indexOf(logo) + 1;
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.cat = logo.cat;
    card.innerHTML = `
      <span class="num">#${globalIdx}</span>
      ${logo.svg}
      <div class="label">${logo.name}</div>
      <div class="style">${logo.style}</div>
    `;
    card.onclick = () => openModal(logo, globalIdx);
    grid.appendChild(card);
  });
}

render(logos);

function filter(cat) {
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (cat === 'all') render(logos);
  else render(logos.filter(l => l.cat === cat));
}

function toggleBg() {
  document.querySelectorAll('.card').forEach(c => c.classList.toggle('light'));
}

function openModal(logo, idx) {
  document.getElementById('modalSvg').innerHTML = logo.svg;
  document.getElementById('modalLabel').textContent = `#${idx} — ${logo.name}`;
  document.getElementById('modalStyle').textContent = logo.style;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
